<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그린링크 회원가입</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Nunito+Sans:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/greenlink/theme-portal.css">
</head>
<body>
<div class="gl-shell gl-fade">
    <header class="gl-topbar">
        <div class="gl-brand">
            <div class="gl-brand-mark">🌿</div>
            <span>GreenLink</span>
        </div>
        <nav class="gl-nav">
            <a href="/home">내 식물</a>
            <a href="/plants">식물 도감</a>
            <a href="/home#dailyQuestCard">퀘스트</a>
            <a href="/home#inventoryCard">인벤토리</a>
            <a href="/home#calendarCard">캘린더</a>
        </nav>
        <div class="gl-icons">
            <button class="gl-btn alt" onclick="location.href='/home'">대시보드</button>
        </div>
    </header>

    <section class="gl-grid" style="grid-template-columns: 1fr 380px;">
        <section class="gl-card">
            <div class="gl-card-head">
                <h2 class="gl-title">회원가입</h2>
                <div class="gl-sub">그린링크를 시작할 계정을 만드세요.</div>
            </div>

            <div class="gl-row-2" style="margin-bottom:12px;">
                <input id="user_username" class="gl-input" placeholder="아이디">
                <input id="user_password" class="gl-input" type="password" placeholder="비밀번호">
            </div>
            <div class="gl-form">
                <input id="user_email" class="gl-input" type="email" placeholder="이메일 주소">
                <div class="gl-row-2">
                    <input id="user_nickname" class="gl-input" placeholder="닉네임">
                    <input id="user_phone" class="gl-input" placeholder="전화번호">
                </div>
                <input id="user_address" class="gl-input" placeholder="주소">
                <div class="gl-actions">
                    <button class="gl-btn" onclick="signup()">회원가입</button>
                    <button class="gl-btn alt" onclick="location.href='/user/login'">로그인</button>
                </div>
                <div id="signupNotice" class="gl-note">기본 정보를 입력하면 로그인 화면으로 이어집니다.</div>
            </div>
        </section>

        <aside class="gl-card">
            <h2 class="gl-title">정원 시작하기</h2>
            <div class="gl-feature-image" style="height:220px; margin-top:10px;">🌼</div>
            <div style="margin-top:12px; display:grid; gap:10px;">
                <div class="gl-sub">가입을 마치면 바로 로그인하고 식물 도감을 둘러볼 수 있습니다.</div>
                <div class="gl-metric-grid">
                    <div class="gl-metric">
                        <div class="gl-sub">프로필</div>
                        <strong>설정</strong>
                    </div>
                    <div class="gl-metric">
                        <div class="gl-sub">정원</div>
                        <strong>시작</strong>
                    </div>
                    <div class="gl-metric">
                        <div class="gl-sub">식물</div>
                        <strong>탐색</strong>
                    </div>
                </div>
            </div>
        </aside>
    </section>
</div>

<script>
function setNotice(message, isError = false) {
    const notice = document.getElementById("signupNotice");
    notice.textContent = message;
    notice.className = isError ? "gl-note error" : "gl-note";
}

function signup() {
    const data = {
        username: $("#user_username").val(),
        password: $("#user_password").val(),
        email: $("#user_email").val(),
        nickname: $("#user_nickname").val(),
        phoneNumber: $("#user_phone").val(),
        address: $("#user_address").val()
    };

    if (!data.username || !data.password || !data.email) {
        setNotice("아이디, 비밀번호, 이메일은 필수입니다.", true);
        return;
    }

    $.ajax({
        url: "/api/user/signup",
        method: "POST",
        contentType: "application/json; charset=utf-8",
        data: JSON.stringify(data),
        success: () => {
            setNotice("회원가입이 완료되었습니다.");
            setTimeout(() => {
                location.href = "/user/login";
            }, 700);
        },
        error: () => {
            setNotice("회원가입에 실패했습니다. 입력값을 확인하세요.", true);
        }
    });
}
</script>
</body>
</html>
