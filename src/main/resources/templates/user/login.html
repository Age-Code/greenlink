<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>그린링크 로그인</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Nunito+Sans:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/greenlink/theme-portal.css">
</head>
<body>
<div class="gl-shell gl-fade">
    <header class="gl-topbar">
        <div class="gl-brand">
            <div class="gl-brand-mark">🌿</div>
            <span>GreenLink</span>
        </div>
        <nav class="gl-nav">
            <a href="/home">내 식물</a>
            <a href="/plants">식물 도감</a>
            <a href="/quests">퀘스트</a>
            <a href="/home#inventoryCard">인벤토리</a>
            <a href="/home#calendarCard">캘린더</a>
        </nav>
        <div class="gl-icons">
            <button class="gl-btn alt" onclick="location.href='/home'">대시보드</button>
        </div>
    </header>

    <section class="gl-grid" style="grid-template-columns: 1fr 380px;">
        <section class="gl-card">
            <div class="gl-card-head">
                <h2 class="gl-title">로그인</h2>
                <div class="gl-sub">정원으로 다시 돌아오세요.</div>
            </div>

            <div class="gl-form">
                <input id="username" class="gl-input" placeholder="아이디를 입력하세요">
                <input id="password" class="gl-input" type="password" placeholder="비밀번호를 입력하세요">
                <div class="gl-actions">
                    <button class="gl-btn" onclick="login()">로그인</button>
                    <button class="gl-btn alt" onclick="logout()">로그아웃</button>
                </div>
                <div id="loginNotice" class="gl-note">아이디와 비밀번호를 입력하면 홈으로 이동합니다.</div>
            </div>
        </section>

        <aside class="gl-card">
            <h2 class="gl-title">다시 오신 것을 환영해요</h2>
            <div class="gl-feature-image" style="height:220px; margin-top:10px;">🌱</div>
            <div style="margin-top:12px; display:grid; gap:10px;">
                <div class="gl-sub">로그인 후 식물 도감과 내 정원을 바로 확인할 수 있습니다.</div>
                <div class="gl-metric-grid">
                    <div class="gl-metric">
                        <div class="gl-sub">정원</div>
                        <strong>준비 완료</strong>
                    </div>
                    <div class="gl-metric">
                        <div class="gl-sub">식물</div>
                        <strong>열람 가능</strong>
                    </div>
                    <div class="gl-metric">
                        <div class="gl-sub">회원가입</div>
                        <strong><a href="/user/signup">계정 만들기</a></strong>
                    </div>
                </div>
            </div>
        </aside>
    </section>
</div>

<script>
function setNotice(message, isError = false) {
    const notice = document.getElementById("loginNotice");
    notice.textContent = message;
    notice.className = isError ? "gl-note error" : "gl-note";
}

function login() {
    const data = {
        username: $("#username").val(),
        password: $("#password").val()
    };

    if (!data.username || !data.password) {
        setNotice("아이디와 비밀번호를 모두 입력하세요.", true);
        return;
    }

    $.ajax({
        url: "/api/login",
        method: "POST",
        contentType: "application/json; charset=utf-8",
        data: JSON.stringify(data),
        success: (response, status, xhr) => {
            const refreshToken = xhr.getResponseHeader("RefreshToken");
            if (!refreshToken) {
                setNotice("로그인에 실패했습니다.", true);
                return;
            }

            localStorage.setItem("RefreshToken", refreshToken);
            getAccessToken();
        },
        error: () => {
            setNotice("아이디 또는 비밀번호를 확인하세요.", true);
        }
    });
}

function getAccessToken() {
    $.ajax({
        url: "/api/auth",
        method: "POST",
        beforeSend: function(xhr) {
            xhr.setRequestHeader("RefreshToken", localStorage.getItem("RefreshToken"));
        },
        success: (response, status, xhr) => {
            const accessToken = xhr.getResponseHeader("Authorization");
            if (!accessToken) {
                setNotice("입장 준비에 실패했습니다.", true);
                return;
            }

            localStorage.setItem("Authorization", accessToken);
            location.href = "/home";
        },
        error: () => {
            setNotice("입장 준비에 실패했습니다.", true);
        }
    });
}

function logout() {
    $.ajax({
        url: "/api/auth",
        method: "DELETE",
        headers: {
            "Authorization": localStorage.getItem("Authorization")
        },
        complete: () => {
            localStorage.clear();
            setNotice("로그아웃되었습니다.");
        }
    });
}

$("#password").on("keydown", function(event) {
    if (event.key === "Enter") {
        login();
    }
});
</script>
</body>
</html>
